# Required by addon-contrib chart CI
image:
  repository: ghcr.io/flock-io/fl-alliance-client
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

flockitImage:
  repository: ghcr.io/flock-io/flockit
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

agent:
  namespace: flock-system
  replicas: 1
  serviceAccountName: flock-agent
  modelApiUrl: http://127.0.0.1:5000
  dataPath: /data
  dataVolume:
    # Use one of:
    # - emptyDir (default): ephemeral
    # - existingClaim: bind a pre-created PVC (recommended for local storage backend)
    # - hostPath: single-node/dev only
    existingClaim: ""
    hostPath: ""
  resources:
    flockAlliance:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    flockit:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 4000m
        memory: 8Gi

addon:
  name: flock-addon
  namespace: open-cluster-management
  displayName: FLock Addon
  description: |
    FLock addon deploys FLockAlliance and FLocKit as a single
    sidecar-based workload on managed clusters. FLockAlliance handles blockchain and
    protocol orchestration, while FLocKit serves model APIs over /call.
  installStrategy: Manual

deploymentConfig:
  enabled: true
  name: flock-addon-config

  blockchain:
    rpc: "https://sepolia.base.org"
    tokenAddress: ""
    taskAddress: ""
    stake: "0"

  training:
    noIncentive: "false"
    numParticipants: "1"

  runtime:
    useGpu: "false"
    # Optional env file path mounted inside the Pod for FLockAlliance.
    # Typical value when using the shared data volume: /data/.env
    flockAllianceEnvFile: "/data/.env"

  storage:
    backend: "s3" # s3 | local
    localSharedDir: "/data/shared"

  # Secret containing blockchain private key for FLockAlliance.
  privateKeySecret:
    name: flock-alliance-secret
    key: CLIENT_PRIVATE_KEY

  # Optional secret used for HF model pulls in FLockAlliance and FLocKit.
  hfTokenSecret:
    name: flock-alliance-secret
    key: HF_TOKEN

  flockit:
    # Optional env file path mounted inside the Pod for FLocKit.
    # Typical value when using the shared data volume: /data/.env
    envFile: "/data/.env"
    confPath: "templates/llm_finetuning/configs/addon_default.yaml"
    overrides: ""
    port: "5000"
    dataPath: "/data"
    dataSource: ""      # Optional; maps to data_args.data_source
    dataIndicesPath: "" # Optional; maps to data_args.data_indices_path

placement:
  gpu:
    enabled: false
    name: flock-addon-gpu-placement
    clusterSet: default
    config:
      name: flock-addon-gpu-config
      useGpu: "true"

  all:
    enabled: false
    name: flock-addon-all-placement
    clusterSet: global
    config:
      name: flock-addon-all-config
      useGpu: "false"
