# Required by addon-contrib chart CI
image:
  repository: ghcr.io/flock-io/fl-alliance-client
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

agent:
  namespace: flock-system
  replicas: 1
  serviceAccountName: flock-agent
  dataPath: /data
  dataVolume:
    # Use one of:
    # - existingClaim: bind a pre-created PVC
    # - hostPath (default): absolute node path that includes .env + datasets (do not use ~)
    # - emptyDir: set both existingClaim/hostPath empty (ephemeral)
    existingClaim: ""
    hostPath: "/data/flock-client"
  resources:
    flockAlliance:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

addon:
  name: flock-addon
  namespace: open-cluster-management
  displayName: FLock Addon
  description: |
    FLock addon deploys FLockAlliance as a direct client workload on managed
    clusters. FLockAlliance handles blockchain/protocol orchestration and local
    model execution.
  installStrategy: Manual

deploymentConfig:
  enabled: true
  name: flock-addon-config

  blockchain:
    # Shared testnet setting: set rpc/tokenAddress/taskAddress centrally via Helm.
    # Per-cluster setting: leave empty and provide from each cluster's mounted .env.
    rpc: ""
    tokenAddress: ""
    taskAddress: ""
    stake: "0"

  training:
    noIncentive: "false"
    numParticipants: "1"

  runtime:
    useGpu: "false"
    # Optional env file path mounted inside the Pod for FLockAlliance.
    # Typical value when using the shared data volume: /data/.env
    flockAllianceEnvFile: "/data/.env"

  storage:
    backend: "s3" # s3 | local
    localSharedDir: "/data/shared"

  # Secret containing blockchain private key for FLockAlliance.
  privateKeySecret:
    name: flock-alliance-secret
    key: CLIENT_PRIVATE_KEY

  # Optional secret used for HF model pulls in FLockAlliance.
  hfTokenSecret:
    name: flock-alliance-secret
    key: HF_TOKEN

placement:
  gpu:
    enabled: false
    name: flock-addon-gpu-placement
    clusterSet: default
    config:
      name: flock-addon-gpu-config
      useGpu: "true"

  all:
    enabled: false
    name: flock-addon-all-placement
    clusterSet: global
    config:
      name: flock-addon-all-config
      useGpu: "false"
