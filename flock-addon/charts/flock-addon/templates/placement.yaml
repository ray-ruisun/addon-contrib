{{- /*
Optional Placement objects. Rendered only when the matching placement
block is enabled. `gpu` selects clusters labeled `gpu=true`. `all`
selects every remaining cluster in its clusterSet (and, when `gpu` is
also enabled, explicitly excludes clusters with `gpu=true` so a cluster
is only bound to one placement at a time).

Each enabled placement is paired with a ManagedClusterSetBinding so the
Placement can actually pick members from its clusterSet without extra
manual setup on the hub.
*/ -}}
{{- if .Values.placement.gpu.enabled }}
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: {{ .Values.placement.gpu.clusterSet }}
  namespace: {{ .Values.addon.namespace }}
spec:
  clusterSet: {{ .Values.placement.gpu.clusterSet }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ .Values.placement.gpu.name }}
  namespace: {{ .Values.addon.namespace }}
spec:
  clusterSets:
    - {{ .Values.placement.gpu.clusterSet }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            gpu: "true"
{{- end }}
{{- if .Values.placement.all.enabled }}
{{- if .Values.placement.gpu.enabled }}
---
{{- end }}
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: {{ .Values.placement.all.clusterSet }}
  namespace: {{ .Values.addon.namespace }}
spec:
  clusterSet: {{ .Values.placement.all.clusterSet }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ .Values.placement.all.name }}
  namespace: {{ .Values.addon.namespace }}
spec:
  clusterSets:
    - {{ .Values.placement.all.clusterSet }}
  {{- if .Values.placement.gpu.enabled }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: gpu
              operator: NotIn
              values:
                - "true"
  {{- end }}
{{- end }}
