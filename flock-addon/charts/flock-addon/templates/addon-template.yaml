{{- $templates := list
    (dict "name" (include "flock-addon.templateName" .) "gpu" false)
    (dict "name" (include "flock-addon.gpuTemplateName" .) "gpu" true)
-}}
{{- range $index, $template := $templates }}
{{- if gt $index 0 }}
---
{{- end }}
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: {{ $template.name }}
spec:
  addonName: {{ $.Values.addon.name }}
  agentSpec:
    workload:
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ $.Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ $.Values.addon.name }}
              app.kubernetes.io/managed-by: open-cluster-management

        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: {{ $.Values.agent.serviceAccountName }}
            namespace: {{ $.Values.agent.namespace }}

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flock-agent
            namespace: {{ $.Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ $.Values.addon.name }}
              app.kubernetes.io/component: agent
            annotations:
              cluster-name: "{{`{{CLUSTER_NAME}}`}}"
          spec:
            replicas: {{ $.Values.agent.replicas }}
            selector:
              matchLabels:
                app.kubernetes.io/name: {{ $.Values.addon.name }}
                app.kubernetes.io/component: agent
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: {{ $.Values.addon.name }}
                  app.kubernetes.io/component: agent
                annotations:
                  cluster-name: "{{`{{CLUSTER_NAME}}`}}"
              spec:
                serviceAccountName: {{ $.Values.agent.serviceAccountName }}
                {{- with $.Values.agent.nodeSelector }}
                nodeSelector:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- with $.Values.agent.tolerations }}
                tolerations:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- with $.Values.agent.affinity }}
                affinity:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- if $.Values.image.pullSecrets }}
                imagePullSecrets:
                  {{- range $.Values.image.pullSecrets }}
                  - name: {{ . | quote }}
                  {{- end }}
                {{- end }}
                volumes:
                  - name: shared-data
                    {{- if $.Values.agent.dataVolume.existingClaim }}
                    persistentVolumeClaim:
                      claimName: {{ $.Values.agent.dataVolume.existingClaim }}
                    {{- else if $.Values.agent.dataVolume.hostPath }}
                    hostPath:
                      path: "{{`{{HOST_DATA_PATH}}`}}"
                      type: DirectoryOrCreate
                    {{- else }}
                    emptyDir: {}
                    {{- end }}
                containers:
                  - name: flock-alliance-client
                    image: "{{`{{FLOCK_ALLIANCE_IMAGE}}`}}"
                    imagePullPolicy: {{ $.Values.image.pullPolicy }}
                    command:
                      - "/bin/sh"
                      - "-ec"
                      - |
                        echo "[flock-addon] startup: USE_GPU=${USE_GPU:-} TASK_ADDRESS=${TASK_ADDRESS:-}"
                        if ls /dev/nvidia* >/dev/null 2>&1; then
                          echo "[flock-addon] NVIDIA device files detected:"
                          ls -l /dev/nvidia* || true
                        else
                          echo "[flock-addon] No NVIDIA device files detected in container"
                        fi
                        if command -v nvidia-smi >/dev/null 2>&1; then
                          echo "[flock-addon] nvidia-smi:"
                          nvidia-smi || true
                        else
                          echo "[flock-addon] nvidia-smi not available in image"
                        fi

                        # Preserve non-empty values injected from OCM so the mounted
                        # .env file can fill blanks, but does not override explicit
                        # deploy-time settings such as TASK_ADDRESS or GPU mode.
                        OCM_DATA_PATH="${DATA_PATH:-}"
                        OCM_BLOCKCHAIN_RPC="${BLOCKCHAIN_RPC:-}"
                        OCM_TOKEN_ADDRESS="${TOKEN_ADDRESS:-}"
                        OCM_TASK_ADDRESS="${TASK_ADDRESS:-}"
                        OCM_STAKE="${STAKE:-}"
                        OCM_STORAGE_BACKEND="${STORAGE_BACKEND:-}"
                        OCM_LOCAL_STORAGE_DIR="${LOCAL_STORAGE_DIR:-}"
                        OCM_USE_GPU="${USE_GPU:-}"
                        OCM_NO_INCENTIVE="${NO_INCENTIVE:-}"
                        OCM_NUM_PARTICIPANTS="${NUM_PARTICIPANTS:-}"

                        if [ -n "${FLOCK_ALLIANCE_ENV_FILE:-}" ] && [ -f "${FLOCK_ALLIANCE_ENV_FILE}" ]; then
                          set -a
                          . "${FLOCK_ALLIANCE_ENV_FILE}"
                          set +a
                        fi

                        if [ -n "${OCM_DATA_PATH:-}" ]; then export DATA_PATH="${OCM_DATA_PATH}"; fi
                        if [ -n "${OCM_BLOCKCHAIN_RPC:-}" ]; then export BLOCKCHAIN_RPC="${OCM_BLOCKCHAIN_RPC}"; fi
                        if [ -n "${OCM_TOKEN_ADDRESS:-}" ]; then export TOKEN_ADDRESS="${OCM_TOKEN_ADDRESS}"; fi
                        if [ -n "${OCM_TASK_ADDRESS:-}" ]; then export TASK_ADDRESS="${OCM_TASK_ADDRESS}"; fi
                        if [ -n "${OCM_STAKE:-}" ]; then export STAKE="${OCM_STAKE}"; fi
                        if [ -n "${OCM_STORAGE_BACKEND:-}" ]; then export STORAGE_BACKEND="${OCM_STORAGE_BACKEND}"; fi
                        if [ -n "${OCM_LOCAL_STORAGE_DIR:-}" ]; then export LOCAL_STORAGE_DIR="${OCM_LOCAL_STORAGE_DIR}"; fi
                        if [ -n "${OCM_USE_GPU:-}" ]; then export USE_GPU="${OCM_USE_GPU}"; fi
                        if [ -n "${OCM_NO_INCENTIVE:-}" ]; then export NO_INCENTIVE="${OCM_NO_INCENTIVE}"; fi
                        if [ -n "${OCM_NUM_PARTICIPANTS:-}" ]; then export NUM_PARTICIPANTS="${OCM_NUM_PARTICIPANTS}"; fi

                        set -- python -u main.py \
                          --config config/conf.yaml \
                          --override "runtime.mode=local" \
                          --override "runtime.gpu=${USE_GPU}" \
                          --override "blockchain.stake=${STAKE}" \
                          --override "storage.backend=${STORAGE_BACKEND}" \
                          --override "storage.local.shared_dir=${LOCAL_STORAGE_DIR}" \
                          --override "training.no_incentive=${NO_INCENTIVE}" \
                          --override "training.num_participants=${NUM_PARTICIPANTS}" \
                          --override "data.inputs=${DATA_PATH}"
                        if [ -n "${BLOCKCHAIN_RPC:-}" ]; then
                          set -- "$@" --override "blockchain.rpc=${BLOCKCHAIN_RPC}"
                        fi
                        if [ -n "${TOKEN_ADDRESS:-}" ]; then
                          set -- "$@" --override "blockchain.token_address=${TOKEN_ADDRESS}"
                        fi
                        if [ -n "${TASK_ADDRESS:-}" ]; then
                          set -- "$@" --override "blockchain.task_address=${TASK_ADDRESS}"
                        fi

                        exec "$@"
                    env:
                      - name: DATA_PATH
                        value: "{{`{{DATA_PATH}}`}}"
                      - name: BLOCKCHAIN_RPC
                        value: "{{`{{BLOCKCHAIN_RPC}}`}}"
                      - name: TOKEN_ADDRESS
                        value: "{{`{{TOKEN_ADDRESS}}`}}"
                      - name: TASK_ADDRESS
                        value: "{{`{{TASK_ADDRESS}}`}}"
                      - name: STAKE
                        value: "{{`{{STAKE}}`}}"
                      - name: STORAGE_BACKEND
                        value: "{{`{{STORAGE_BACKEND}}`}}"
                      - name: LOCAL_STORAGE_DIR
                        value: "{{`{{LOCAL_STORAGE_DIR}}`}}"
                      - name: USE_GPU
                        value: "{{`{{USE_GPU}}`}}"
                      - name: NO_INCENTIVE
                        value: "{{`{{NO_INCENTIVE}}`}}"
                      - name: NUM_PARTICIPANTS
                        value: "{{`{{NUM_PARTICIPANTS}}`}}"
                      - name: FLOCK_ALLIANCE_ENV_FILE
                        value: "{{`{{FLOCK_ALLIANCE_ENV_FILE}}`}}"
                      # TODO(flock-addon): if needed later, add optional secret-based
                      # fallback for PRIVATE_KEY/HF_TOKEN. Current mode uses .env only.
                    volumeMounts:
                      - name: shared-data
                        mountPath: /data
                    {{- $resources := deepCopy $.Values.agent.resources.flockAlliance }}
                    {{- if $template.gpu }}
                    {{- if not (hasKey $resources "requests") }}
                    {{- $_ := set $resources "requests" (dict) }}
                    {{- end }}
                    {{- if not (hasKey $resources "limits") }}
                    {{- $_ := set $resources "limits" (dict) }}
                    {{- end }}
                    {{- $_ := set $resources.requests "nvidia.com/gpu" $.Values.agent.gpuResource.count }}
                    {{- $_ := set $resources.limits "nvidia.com/gpu" $.Values.agent.gpuResource.count }}
                    {{- end }}
                    resources:
                      {{- toYaml $resources | nindent 22 }}
{{- end }}
