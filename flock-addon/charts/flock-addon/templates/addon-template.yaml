apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: {{ .Values.addon.name }}
spec:
  addonName: {{ .Values.addon.name }}
  agentSpec:
    workload:
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ .Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ .Values.addon.name }}
              app.kubernetes.io/managed-by: open-cluster-management

        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: {{ .Values.agent.serviceAccountName }}
            namespace: {{ .Values.agent.namespace }}

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flock-agent
            namespace: {{ .Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ .Values.addon.name }}
              app.kubernetes.io/component: agent
            annotations:
              cluster-name: "{{`{{CLUSTER_NAME}}`}}"
          spec:
            replicas: {{ .Values.agent.replicas }}
            selector:
              matchLabels:
                app.kubernetes.io/name: {{ .Values.addon.name }}
                app.kubernetes.io/component: agent
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: {{ .Values.addon.name }}
                  app.kubernetes.io/component: agent
                annotations:
                  cluster-name: "{{`{{CLUSTER_NAME}}`}}"
              spec:
                serviceAccountName: {{ .Values.agent.serviceAccountName }}
                volumes:
                  - name: shared-data
                    {{- if .Values.agent.dataVolume.existingClaim }}
                    persistentVolumeClaim:
                      claimName: {{ .Values.agent.dataVolume.existingClaim }}
                    {{- else if .Values.agent.dataVolume.hostPath }}
                    hostPath:
                      path: {{ .Values.agent.dataVolume.hostPath }}
                      type: DirectoryOrCreate
                    {{- else }}
                    emptyDir: {}
                    {{- end }}
                containers:
                  - name: flock-alliance-client
                    image: "{{`{{FLOCK_ALLIANCE_IMAGE}}`}}"
                    imagePullPolicy: {{ .Values.image.pullPolicy }}
                    command:
                      - "/bin/sh"
                      - "-ec"
                      - |
                        if [ -n "${FLOCK_ALLIANCE_ENV_FILE:-}" ] && [ -f "${FLOCK_ALLIANCE_ENV_FILE}" ]; then
                          set -a
                          . "${FLOCK_ALLIANCE_ENV_FILE}"
                          set +a
                        fi

                        exec python -u main.py \
                          --config config/conf.yaml \
                          --override "runtime.mode=local" \
                          --override "runtime.gpu=${USE_GPU}" \
                          --override "blockchain.rpc=${BLOCKCHAIN_RPC}" \
                          --override "blockchain.token_address=${TOKEN_ADDRESS}" \
                          --override "blockchain.task_address=${TASK_ADDRESS}" \
                          --override "blockchain.stake=${STAKE}" \
                          --override "storage.backend=${STORAGE_BACKEND}" \
                          --override "storage.local.shared_dir=${LOCAL_STORAGE_DIR}" \
                          --override "training.no_incentive=${NO_INCENTIVE}" \
                          --override "training.num_participants=${NUM_PARTICIPANTS}" \
                          --override "data.inputs=${DATA_PATH}"
                    env:
                      - name: DATA_PATH
                        value: "{{`{{DATA_PATH}}`}}"
                      - name: BLOCKCHAIN_RPC
                        value: "{{`{{BLOCKCHAIN_RPC}}`}}"
                      - name: TOKEN_ADDRESS
                        value: "{{`{{TOKEN_ADDRESS}}`}}"
                      - name: TASK_ADDRESS
                        value: "{{`{{TASK_ADDRESS}}`}}"
                      - name: STAKE
                        value: "{{`{{STAKE}}`}}"
                      - name: STORAGE_BACKEND
                        value: "{{`{{STORAGE_BACKEND}}`}}"
                      - name: LOCAL_STORAGE_DIR
                        value: "{{`{{LOCAL_STORAGE_DIR}}`}}"
                      - name: USE_GPU
                        value: "{{`{{USE_GPU}}`}}"
                      - name: NO_INCENTIVE
                        value: "{{`{{NO_INCENTIVE}}`}}"
                      - name: NUM_PARTICIPANTS
                        value: "{{`{{NUM_PARTICIPANTS}}`}}"
                      - name: FLOCK_ALLIANCE_ENV_FILE
                        value: "{{`{{FLOCK_ALLIANCE_ENV_FILE}}`}}"
                      - name: PRIVATE_KEY
                        valueFrom:
                          secretKeyRef:
                            name: "{{`{{PRIVATE_KEY_SECRET_NAME}}`}}"
                            key: "{{`{{PRIVATE_KEY_SECRET_KEY}}`}}"
                      - name: HF_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: "{{`{{HF_TOKEN_SECRET_NAME}}`}}"
                            key: "{{`{{HF_TOKEN_SECRET_KEY}}`}}"
                            optional: true
                    volumeMounts:
                      - name: shared-data
                        mountPath: /data
                    resources:
                      {{- toYaml .Values.agent.resources.flockAlliance | nindent 22 }}
