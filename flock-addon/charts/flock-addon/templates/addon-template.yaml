{{- /*
AddOnTemplate renders the workload that every managed cluster will run when
the flock-addon is enabled on it. Two templates are emitted:

  * {{ include "flock-addon.templateName" . }}     - CPU variant
  * {{ include "flock-addon.gpuTemplateName" . }}  - GPU variant, identical to
    the CPU variant except for nvidia.com/gpu requests/limits.

The Deployment entrypoint is a small POSIX-shell wrapper that:

  1. Emits diagnostic logs (GPU visibility, nvidia-smi, env summary) so the
     Pod logs always contain enough context to debug a rollout without
     exec'ing into the container.
  2. Snapshots hub-pushed environment variables BEFORE sourcing the node-
     local .env file. The OCM-pushed values are authoritative: if a variable
     is non-empty on the hub side, it wins over anything the node .env set.
     If a variable is empty on the hub side, the node .env value is used.
     This keeps shared deployment state (task address, storage backend,
     blockchain RPC in hub-managed modes, etc.) consistent across the fleet
     while still allowing per-node secrets (PRIVATE_KEY, HF_TOKEN, ...) to
     live on each node.
  3. Builds the final `python -u main.py ...` argv, with runtime overrides
     that match the addon's documented semantics, and exec's it so signals
     (SIGTERM from kubelet) reach the Python process directly.
*/ -}}
{{- $templates := list
    (dict "name" (include "flock-addon.templateName" .) "gpu" false)
    (dict "name" (include "flock-addon.gpuTemplateName" .) "gpu" true)
-}}
{{- range $index, $template := $templates }}
{{- if gt $index 0 }}
---
{{- end }}
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: AddOnTemplate
metadata:
  name: {{ $template.name }}
spec:
  addonName: {{ $.Values.addon.name }}
  agentSpec:
    workload:
      manifests:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ $.Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ $.Values.addon.name }}
              app.kubernetes.io/managed-by: open-cluster-management

        - apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: {{ $.Values.agent.serviceAccountName }}
            namespace: {{ $.Values.agent.namespace }}

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flock-agent
            namespace: {{ $.Values.agent.namespace }}
            labels:
              app.kubernetes.io/name: {{ $.Values.addon.name }}
              app.kubernetes.io/component: agent
              app.kubernetes.io/variant: {{ if $template.gpu }}gpu{{ else }}cpu{{ end }}
            annotations:
              cluster-name: "{{`{{CLUSTER_NAME}}`}}"
          spec:
            replicas: {{ $.Values.agent.replicas }}
            revisionHistoryLimit: 3
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app.kubernetes.io/name: {{ $.Values.addon.name }}
                app.kubernetes.io/component: agent
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: {{ $.Values.addon.name }}
                  app.kubernetes.io/component: agent
                  app.kubernetes.io/variant: {{ if $template.gpu }}gpu{{ else }}cpu{{ end }}
                annotations:
                  cluster-name: "{{`{{CLUSTER_NAME}}`}}"
              spec:
                serviceAccountName: {{ $.Values.agent.serviceAccountName }}
                terminationGracePeriodSeconds: 30
                {{- with $.Values.agent.nodeSelector }}
                nodeSelector:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- with $.Values.agent.tolerations }}
                tolerations:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- with $.Values.agent.affinity }}
                affinity:
                  {{- toYaml . | nindent 18 }}
                {{- end }}
                {{- if $.Values.image.pullSecrets }}
                imagePullSecrets:
                  {{- range $.Values.image.pullSecrets }}
                  - name: {{ . | quote }}
                  {{- end }}
                {{- end }}
                volumes:
                  - name: shared-data
                    {{- if $.Values.agent.dataVolume.existingClaim }}
                    persistentVolumeClaim:
                      claimName: {{ $.Values.agent.dataVolume.existingClaim }}
                    {{- else if $.Values.agent.dataVolume.hostPath }}
                    hostPath:
                      path: "{{`{{HOST_DATA_PATH}}`}}"
                      type: DirectoryOrCreate
                    {{- else }}
                    emptyDir: {}
                    {{- end }}
                containers:
                  - name: flock-alliance-client
                    image: "{{`{{FLOCK_ALLIANCE_IMAGE}}`}}"
                    imagePullPolicy: {{ $.Values.image.pullPolicy }}
                    command:
                      - "/bin/sh"
                      - "-ec"
                      - |
                        # ---------------------------------------------------------
                        # flock-addon entrypoint.
                        # Fails fast on any unexpected shell error (set -e from -ec).
                        # ---------------------------------------------------------
                        log() { printf '[flock-addon] %s\n' "$*"; }

                        log "startup: image entrypoint beginning"
                        log "vars: USE_GPU=${USE_GPU:-} STORAGE_BACKEND=${STORAGE_BACKEND:-} NO_INCENTIVE=${NO_INCENTIVE:-} NUM_PARTICIPANTS=${NUM_PARTICIPANTS:-}"
                        log "vars: TASK_ADDRESS=${TASK_ADDRESS:-<empty>} TOKEN_ADDRESS=${TOKEN_ADDRESS:-<empty>} BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC:-<empty>}"
                        log "vars: DATA_PATH=${DATA_PATH:-} LOCAL_STORAGE_DIR=${LOCAL_STORAGE_DIR:-} FLOCK_ALLIANCE_ENV_FILE=${FLOCK_ALLIANCE_ENV_FILE:-}"

                        # Device visibility: useful whether or not the Pod actually
                        # requested GPUs, because a missing NVIDIA runtime is one of
                        # the most common rollout failures on GPU-labeled nodes.
                        if ls /dev/nvidia* >/dev/null 2>&1; then
                          log "NVIDIA device files detected:"
                          ls -l /dev/nvidia* || true
                        else
                          log "no NVIDIA device files detected in container"
                        fi
                        if command -v nvidia-smi >/dev/null 2>&1; then
                          log "nvidia-smi:"
                          nvidia-smi || true
                        else
                          log "nvidia-smi not available in image"
                        fi

                        # ---------------------------------------------------------
                        # Snapshot hub-pushed variables BEFORE sourcing node .env,
                        # so a hub-pushed non-empty value always wins.
                        # ---------------------------------------------------------
                        OCM_BLOCKCHAIN_RPC="${BLOCKCHAIN_RPC:-}"
                        OCM_TOKEN_ADDRESS="${TOKEN_ADDRESS:-}"
                        OCM_TASK_ADDRESS="${TASK_ADDRESS:-}"
                        OCM_STAKE="${STAKE:-}"
                        OCM_LOCAL_STORAGE_DIR="${LOCAL_STORAGE_DIR:-}"
                        OCM_S3_COMPAT_ENDPOINT_URL="${S3_COMPAT_ENDPOINT_URL:-}"
                        OCM_S3_COMPAT_BUCKET="${S3_COMPAT_BUCKET:-}"
                        OCM_S3_COMPAT_ACCESS_KEY="${S3_COMPAT_ACCESS_KEY:-}"
                        OCM_S3_COMPAT_SECRET_KEY="${S3_COMPAT_SECRET_KEY:-}"
                        OCM_S3_COMPAT_REGION="${S3_COMPAT_REGION:-}"
                        OCM_S3_COMPAT_ADDRESSING_STYLE="${S3_COMPAT_ADDRESSING_STYLE:-}"
                        OCM_S3_COMPAT_VERIFY_SSL="${S3_COMPAT_VERIFY_SSL:-}"
                        OCM_USE_GPU="${USE_GPU:-}"
                        OCM_STORAGE_BACKEND="${STORAGE_BACKEND:-}"
                        OCM_NO_INCENTIVE="${NO_INCENTIVE:-}"
                        OCM_NUM_PARTICIPANTS="${NUM_PARTICIPANTS:-}"

                        # Source the node .env so per-node secrets (PRIVATE_KEY,
                        # HF_TOKEN, ...) and optional BLOCKCHAIN_RPC for testnet
                        # mode become part of the environment.
                        if [ -n "${FLOCK_ALLIANCE_ENV_FILE:-}" ]; then
                          if [ -f "${FLOCK_ALLIANCE_ENV_FILE}" ]; then
                            log "loading env file: ${FLOCK_ALLIANCE_ENV_FILE}"
                            set -a
                            # shellcheck disable=SC1090
                            . "${FLOCK_ALLIANCE_ENV_FILE}"
                            set +a
                          else
                            log "env file not found: ${FLOCK_ALLIANCE_ENV_FILE} (continuing; hub-pushed values and container env will be used)"
                          fi
                        else
                          log "FLOCK_ALLIANCE_ENV_FILE is empty; skipping node env load"
                        fi

                        # ---------------------------------------------------------
                        # Reassert hub-pushed values. Rule: if the hub pushed a
                        # non-empty value for a given variable, the hub wins,
                        # regardless of storage backend. Only when the hub is
                        # silent (empty value) do we keep whatever .env set.
                        # ---------------------------------------------------------
                        ocm_wins() {
                          # $1 = variable name, $2 = hub-captured value
                          if [ -n "${2:-}" ]; then
                            export "$1=$2"
                          fi
                        }

                        ocm_wins TASK_ADDRESS              "$OCM_TASK_ADDRESS"
                        ocm_wins USE_GPU                   "$OCM_USE_GPU"
                        ocm_wins STORAGE_BACKEND           "$OCM_STORAGE_BACKEND"
                        ocm_wins NO_INCENTIVE              "$OCM_NO_INCENTIVE"
                        ocm_wins NUM_PARTICIPANTS          "$OCM_NUM_PARTICIPANTS"
                        ocm_wins STAKE                     "$OCM_STAKE"
                        ocm_wins BLOCKCHAIN_RPC            "$OCM_BLOCKCHAIN_RPC"
                        ocm_wins TOKEN_ADDRESS             "$OCM_TOKEN_ADDRESS"
                        ocm_wins LOCAL_STORAGE_DIR         "$OCM_LOCAL_STORAGE_DIR"
                        ocm_wins S3_COMPAT_ENDPOINT_URL    "$OCM_S3_COMPAT_ENDPOINT_URL"
                        ocm_wins S3_COMPAT_BUCKET          "$OCM_S3_COMPAT_BUCKET"
                        ocm_wins S3_COMPAT_ACCESS_KEY      "$OCM_S3_COMPAT_ACCESS_KEY"
                        ocm_wins S3_COMPAT_SECRET_KEY      "$OCM_S3_COMPAT_SECRET_KEY"
                        ocm_wins S3_COMPAT_REGION          "$OCM_S3_COMPAT_REGION"
                        ocm_wins S3_COMPAT_ADDRESSING_STYLE "$OCM_S3_COMPAT_ADDRESSING_STYLE"
                        ocm_wins S3_COMPAT_VERIFY_SSL      "$OCM_S3_COMPAT_VERIFY_SSL"

                        log "effective: STORAGE_BACKEND=${STORAGE_BACKEND:-} USE_GPU=${USE_GPU:-} NO_INCENTIVE=${NO_INCENTIVE:-} NUM_PARTICIPANTS=${NUM_PARTICIPANTS:-}"
                        log "effective: BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC:+<set>}${BLOCKCHAIN_RPC:-<empty>} TOKEN_ADDRESS=${TOKEN_ADDRESS:+<set>}${TOKEN_ADDRESS:-<empty>} TASK_ADDRESS=${TASK_ADDRESS:+<set>}${TASK_ADDRESS:-<empty>}"
                        if [ "${STORAGE_BACKEND:-}" = "nami" ]; then
                          log "effective: S3_COMPAT_ENDPOINT_URL=${S3_COMPAT_ENDPOINT_URL:-} S3_COMPAT_BUCKET=${S3_COMPAT_BUCKET:-} S3_COMPAT_REGION=${S3_COMPAT_REGION:-}"
                        fi

                        # Fail-fast preconditions per backend. Clear errors are
                        # far easier to debug than a Python stack trace later.
                        case "${STORAGE_BACKEND:-}" in
                          s3|local|nami)
                            ;;
                          "")
                            log "ERROR: STORAGE_BACKEND is empty; expected one of s3|local|nami"
                            exit 2
                            ;;
                          *)
                            log "ERROR: unsupported STORAGE_BACKEND=${STORAGE_BACKEND}; expected one of s3|local|nami"
                            exit 2
                            ;;
                        esac

                        if [ -z "${TASK_ADDRESS:-}" ]; then
                          log "WARN: TASK_ADDRESS is empty; FLockAlliance will refuse to start if the onchain task cannot be resolved"
                        fi

                        # ---------------------------------------------------------
                        # Build and exec the Python entrypoint. Overrides track
                        # the documented runtime parameter flow. --override values
                        # are only appended when their source env var is non-empty
                        # so FLockAlliance's YAML defaults apply otherwise.
                        # ---------------------------------------------------------
                        set -- python -u main.py \
                          --config config/conf.yaml \
                          --override "runtime.mode=local" \
                          --override "runtime.gpu=${USE_GPU}" \
                          --override "blockchain.stake=${STAKE}" \
                          --override "storage.backend=${STORAGE_BACKEND}" \
                          --override "training.no_incentive=${NO_INCENTIVE}" \
                          --override "data.inputs=${DATA_PATH}"

                        if [ -n "${LOCAL_STORAGE_DIR:-}" ]; then
                          set -- "$@" --override "storage.local.shared_dir=${LOCAL_STORAGE_DIR}"
                        fi
                        if [ -n "${NUM_PARTICIPANTS:-}" ]; then
                          set -- "$@" --override "training.num_participants=${NUM_PARTICIPANTS}"
                        fi
                        if [ -n "${BLOCKCHAIN_RPC:-}" ]; then
                          set -- "$@" --override "blockchain.rpc=${BLOCKCHAIN_RPC}"
                        fi
                        if [ -n "${TOKEN_ADDRESS:-}" ]; then
                          set -- "$@" --override "blockchain.token_address=${TOKEN_ADDRESS}"
                        fi
                        if [ -n "${TASK_ADDRESS:-}" ]; then
                          set -- "$@" --override "blockchain.task_address=${TASK_ADDRESS}"
                        fi

                        log "exec: $*"
                        exec "$@"
                    env:
                      - name: DATA_PATH
                        value: "{{`{{DATA_PATH}}`}}"
                      - name: BLOCKCHAIN_RPC
                        value: "{{`{{BLOCKCHAIN_RPC}}`}}"
                      - name: TOKEN_ADDRESS
                        value: "{{`{{TOKEN_ADDRESS}}`}}"
                      - name: TASK_ADDRESS
                        value: "{{`{{TASK_ADDRESS}}`}}"
                      - name: STAKE
                        value: "{{`{{STAKE}}`}}"
                      - name: STORAGE_BACKEND
                        value: "{{`{{STORAGE_BACKEND}}`}}"
                      - name: LOCAL_STORAGE_DIR
                        value: "{{`{{LOCAL_STORAGE_DIR}}`}}"
                      - name: S3_COMPAT_ENDPOINT_URL
                        value: "{{`{{S3_COMPAT_ENDPOINT_URL}}`}}"
                      - name: S3_COMPAT_BUCKET
                        value: "{{`{{S3_COMPAT_BUCKET}}`}}"
                      - name: S3_COMPAT_ACCESS_KEY
                        value: "{{`{{S3_COMPAT_ACCESS_KEY}}`}}"
                      - name: S3_COMPAT_SECRET_KEY
                        value: "{{`{{S3_COMPAT_SECRET_KEY}}`}}"
                      - name: S3_COMPAT_REGION
                        value: "{{`{{S3_COMPAT_REGION}}`}}"
                      - name: S3_COMPAT_ADDRESSING_STYLE
                        value: "{{`{{S3_COMPAT_ADDRESSING_STYLE}}`}}"
                      - name: S3_COMPAT_VERIFY_SSL
                        value: "{{`{{S3_COMPAT_VERIFY_SSL}}`}}"
                      - name: USE_GPU
                        value: "{{`{{USE_GPU}}`}}"
                      - name: NO_INCENTIVE
                        value: "{{`{{NO_INCENTIVE}}`}}"
                      - name: NUM_PARTICIPANTS
                        value: "{{`{{NUM_PARTICIPANTS}}`}}"
                      - name: FLOCK_ALLIANCE_ENV_FILE
                        value: "{{`{{FLOCK_ALLIANCE_ENV_FILE}}`}}"
                    volumeMounts:
                      - name: shared-data
                        mountPath: /data
                    {{- $resources := deepCopy $.Values.agent.resources.flockAlliance }}
                    {{- if $template.gpu }}
                    {{- if not (hasKey $resources "requests") }}
                    {{- $_ := set $resources "requests" (dict) }}
                    {{- end }}
                    {{- if not (hasKey $resources "limits") }}
                    {{- $_ := set $resources "limits" (dict) }}
                    {{- end }}
                    {{- $_ := set $resources.requests "nvidia.com/gpu" $.Values.agent.gpuResource.count }}
                    {{- $_ := set $resources.limits "nvidia.com/gpu" $.Values.agent.gpuResource.count }}
                    {{- end }}
                    resources:
                      {{- toYaml $resources | nindent 22 }}
{{- end }}
