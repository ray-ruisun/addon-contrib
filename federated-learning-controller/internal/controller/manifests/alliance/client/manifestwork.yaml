apiVersion: work.open-cluster-management.io/v1
kind: ManifestWork
metadata:
  name: {{.ManifestName}}
  namespace: {{.ManifestNamespace}}
spec:
  manifestConfigs:
    - resourceIdentifier:
        group: batch
        resource: jobs
        namespace: {{ .ClientJobNamespace }}
        name: {{ .ClientJobName }}
      updateStrategy:
        type: ServerSideApply
  deleteOption:
    propagationPolicy: SelectivelyOrphan
    selectivelyOrphans:
      orphaningRules:
      - group: ""
        resource: namespaces
        name: {{ .ClientJobNamespace }}
  workload:
    manifests:
      - kind: Namespace
        apiVersion: v1
        metadata:
          name: {{.ClientJobNamespace}}
      - kind: Job
        apiVersion: batch/v1
        metadata:
          name: {{ .ClientJobName }}
          namespace: {{ .ClientJobNamespace }}
        spec:
          selector:
            matchLabels:
              job-name: {{ .ClientJobName }}
          template:
            metadata:
              labels:
                job-name: {{ .ClientJobName }}
            spec:
              shareProcessNamespace: true
              volumes:
                - name: shared-data
                  emptyDir: {}
              containers:
              - name: alliance-client
                image: {{ .ClientJobImage }}
                imagePullPolicy: Always
                command:
                  - "python"
                  - "-u"
                  - "main.py"
                  - "--config"
                  - "config/conf.yaml"
                  - "--override"
                  - "runtime.mode={{ .RuntimeMode }}"
                  - "--override"
                  - "runtime.model_api_url={{ .ModelAPIURL }}"
                  - "--override"
                  - "runtime.gpu={{ .UseGPU }}"
                  - "--override"
                  - "blockchain.rpc={{ .BlockchainRPC }}"
                  - "--override"
                  - "blockchain.token_address={{ .TokenAddress }}"
                  - "--override"
                  - "blockchain.task_address={{ .TaskAddress }}"
                  - "--override"
                  - "blockchain.stake={{ .Stake }}"
                  - "--override"
                  - "storage.backend={{ .StorageBackend }}"
                  - "--override"
                  - "storage.local.shared_dir={{ .LocalSharedDir }}"
                  - "--override"
                  - "training.no_incentive={{ .NoIncentive }}"
                  - "--override"
                  - "training.num_participants={{ .NumParticipants }}"
                  - "--override"
                  - "data.inputs={{ .DataPath }}"
                env:
                  - name: PRIVATE_KEY
                    valueFrom:
                      secretKeyRef:
                        name: {{ .PrivateKeySecretName }}
                        key: {{ .PrivateKeySecretKey }}
                  {{- if .HasHFTokenSecret }}
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: {{ .HFTokenSecretName }}
                        key: {{ .HFTokenSecretKey }}
                        optional: true
                  {{- end }}
                volumeMounts:
                  - name: shared-data
                    mountPath: /data
              - name: flockit
                image: {{ .FLocKitImage }}
                imagePullPolicy: Always
                ports:
                  - name: flockit-http
                    containerPort: {{ .FLocKitPort }}
                env:
                  - name: FLOCKIT_CONF
                    value: "{{ .FLocKitConfigPath }}"
                  - name: FLOCKIT_PORT
                    value: "{{ .FLocKitPort }}"
                  - name: FLOCKIT_DATA_PATH
                    value: "{{ .DataPath }}"
                  - name: FLOCKIT_DATA_SOURCE
                    value: "{{ .FLocKitDataSource }}"
                  - name: FLOCKIT_DATA_INDICES_PATH
                    value: "{{ .FLocKitDataIndicesPath }}"
                  - name: FLOCKIT_OVERRIDES
                    value: |-
                      {{ .FLocKitOverrides }}
                  {{- if .HasHFTokenSecret }}
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: {{ .HFTokenSecretName }}
                        key: {{ .HFTokenSecretKey }}
                        optional: true
                  {{- end }}
                readinessProbe:
                  tcpSocket:
                    port: flockit-http
                  initialDelaySeconds: 5
                  periodSeconds: 5
                startupProbe:
                  tcpSocket:
                    port: flockit-http
                  # Large models may take minutes to initialize.
                  periodSeconds: 5
                  failureThreshold: 180
                livenessProbe:
                  tcpSocket:
                    port: flockit-http
                  initialDelaySeconds: 30
                  periodSeconds: 10
                volumeMounts:
                  - name: shared-data
                    mountPath: /data
              restartPolicy: Never
