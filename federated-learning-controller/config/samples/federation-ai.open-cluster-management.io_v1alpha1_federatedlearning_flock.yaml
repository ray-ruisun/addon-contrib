apiVersion: federation-ai.open-cluster-management.io/v1alpha1
kind: FederatedLearning
metadata:
  name: flock-sample
spec:
  framework: flock
  client:
    image: ghcr.io/flock-io/fl-alliance-client:v0.1.0
    placement:
      clusterSets:
        - global
      predicates:
        # For dataVolumeType=hostPath, selected cluster claim value is used as host path.
        # For dataVolumeType=emptyDir/pvc, this claim selector can be removed.
        - requiredClusterSelector:
            claimSelector:
              matchExpressions:
                - key: flock-sample.client-data
                  operator: Exists
  # FLockAlliance specific settings
  flockAlliance:
    runtimeMode: local
    useGpu: false
    # PRIVATE_KEY/HF_TOKEN are read from /data/.env on each selected cluster.
    # Optional: if omitted, runtime can read BLOCKCHAIN_RPC from /data/.env on each cluster
    blockchainRpc: ""
    # Optional: if omitted, TOKEN_ADDRESS/TASK_ADDRESS can be read from /data/.env
    tokenAddress: ""
    taskAddress: ""
    stake: "0"
    storageBackend: s3
    localSharedDir: /data/shared
    noIncentive: false
    numParticipants: 1
    # Data volume mode for client /data mount: hostPath | emptyDir | pvc.
    dataVolumeType: hostPath
    # Required only when dataVolumeType=pvc.
    # dataVolumeClaimName: flock-client-data
