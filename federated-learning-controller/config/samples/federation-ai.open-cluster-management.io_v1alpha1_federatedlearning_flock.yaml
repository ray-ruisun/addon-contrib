apiVersion: federation-ai.open-cluster-management.io/v1alpha1
kind: FederatedLearning
metadata:
  name: flock-sample
spec:
  framework: flock
  client:
    image: ghcr.io/flock-io/fl-alliance-client:v0.1.0
    placement:
      clusterSets:
        - global
      predicates:
        - requiredClusterSelector:
            claimSelector:
              matchExpressions:
                - key: flock-sample.client-data
                  operator: Exists
  # FLockAlliance specific settings
  flockAlliance:
    runtimeMode: local
    useGpu: false
    # Optional: if omitted, runtime can read BLOCKCHAIN_RPC from /data/.env on each cluster
    blockchainRpc: ""
    # Optional: if omitted, TOKEN_ADDRESS/TASK_ADDRESS can be read from /data/.env
    tokenAddress: ""
    taskAddress: ""
    stake: "0"
    storageBackend: s3
    localSharedDir: /data/shared
    noIncentive: false
    numParticipants: 1
    # Host folder to mount into container /data. Put datasets + .env here.
    dataPath: /data/flock-client
    privateKeySecret:
      name: flock-alliance-secret
      key: CLIENT_PRIVATE_KEY
    hfTokenSecret:
      name: flock-alliance-secret
      key: HF_TOKEN
